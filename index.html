<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧠 Brain Firebase</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
background:#f6f8fa;color:#1f2328;
min-height:100vh;display:flex;flex-direction:column;
align-items:center;padding:40px 16px
}
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.header-icon{
width:40px;height:40px;background:#1f2328;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.card{
width:100%;max-width:480px;background:#fff;
border:1px solid #d0d7de;border-radius:12px;
overflow:hidden;margin-bottom:20px
}
.card-header{
background:#f6f8fa;padding:14px 20px;
font-weight:600;border-bottom:1px solid #d0d7de
}
.card-body{
padding:20px;display:flex;
flex-direction:column;gap:14px
}
.input-wrap input{
width:100%;
padding:8px 12px;
border:1px solid #d0d7de;
border-radius:6px
}
.card-footer{
padding:14px 20px;
background:#f6f8fa;
display:flex;
justify-content:space-between
}
.btn-save{
padding:8px 16px;
background:#2da44e;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer
}
</style>
</head>

<body>

<div class="header">
<div class="header-icon">🧠</div>
<div>
<div><b>Brain Firebase</b></div>
<small>brain-orcamento · dados</small>
</div>
</div>

<!-- 🔥 SEU SISTEMA ORIGINAL (MANTIDO) -->
<div class="card">
<div class="card-header">＋ Produto / Dados</div>
<div class="card-body">

<input id="titulo" placeholder="Título">
<input id="valor" placeholder="Valor">
<input id="link" placeholder="Link">
<input id="linkImagem" placeholder="Imagem">
<input id="descricao" placeholder="Descrição">
<input id="marca" placeholder="Marca">

</div>

<div class="card-footer">
<button class="btn-save" onclick="salvarDados()">Salvar</button>
</div>
</div>

<!-- 👤 CLIENTE -->
<div class="card">
<div class="card-header">👤 Usuário</div>
<div class="card-body">

<input id="u_nome" placeholder="Nome">
<input id="u_telefone" placeholder="Telefone">
<input id="u_email" placeholder="Email">

</div>

<div class="card-footer">
<button class="btn-save" onclick="salvarUsuario()">Salvar Usuário</button>
</div>
</div>

<!-- 👷 FUNCIONÁRIO -->
<div class="card">
<div class="card-header">👷 Funcionário</div>
<div class="card-body">

<input id="f_nome" placeholder="Nome">
<input id="f_telefone" placeholder="Telefone">
<input id="f_email" placeholder="Email">
<input id="f_endereco" placeholder="Endereço">
<input id="f_cidade" placeholder="Cidade">
<input id="f_pais" placeholder="País">
<input id="f_preco" placeholder="Preço">
<input id="f_id" placeholder="Identificação">

</div>

<div class="card-footer">
<button class="btn-save" onclick="salvarFuncionario()">Salvar Funcionário</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAE2VcJyqu01rtqlgVoMg634FFfTGxiRgc",
authDomain:"brain-orcamento.firebaseapp.com",
projectId:"brain-orcamento",
storageBucket:"brain-orcamento.firebasestorage.app",
messagingSenderId:"991853359315",
appId:"1:991853359315:web:b2270aab447a853b212426"
});

const db = getFirestore(app);

/* 🔥 SEU SISTEMA ORIGINAL */
window.salvarDados = async () => {

await addDoc(collection(db,"dados"),{
tipo:"produto",
titulo:document.getElementById("titulo").value,
valor:document.getElementById("valor").value,
link:document.getElementById("link").value,
linkImagem:document.getElementById("linkImagem").value,
descricao:document.getElementById("descricao").value,
marca:document.getElementById("marca").value
});

alert("Produto salvo!");
};

/* 👤 USUÁRIO */
window.salvarUsuario = async () => {

await addDoc(collection(db,"dados"),{
tipo:"usuario",
nome:document.getElementById("u_nome").value,
telefone:document.getElementById("u_telefone").value,
email:document.getElementById("u_email").value
});

alert("Usuário salvo!");
};

/* 👷 FUNCIONÁRIO */
window.salvarFuncionario = async () => {

await addDoc(collection(db,"dados"),{
tipo:"funcionario",
nome:document.getElementById("f_nome").value,
telefone:document.getElementById("f_telefone").value,
email:document.getElementById("f_email").value,
endereco:document.getElementById("f_endereco").value,
cidade:document.getElementById("f_cidade").value,
pais:document.getElementById("f_pais").value,
preco:document.getElementById("f_preco").value,
identificacao:document.getElementById("f_id").value
});

alert("Funcionário salvo!");
};

</script>

</body>
</html>
